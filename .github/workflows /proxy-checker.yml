name: Проверка SOCKS5 прокси

on:
  schedule:
    # Запуск каждые 5 минут. 
    # Если лимит минут исчерпается, поменяйте на '*/30 * * * *' (каждые 30 мин)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Позволяет запускать Action вручную из вкладки Actions

jobs:
  check-proxies:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Необходимо для пуша изменений обратно в репозиторий

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install requests pysocks

      - name: Запуск скрипта проверки
        run: python checker.py

      - name: Коммит и пуш изменений
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proxies.txt
          
          # Проверяем, есть ли изменения. Если прокси не удалились, коммитить нечего.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Авто-очистка нерабочих SOCKS5" && git push)
